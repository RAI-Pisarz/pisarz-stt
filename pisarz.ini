[whisper]
record_timeout = 2
phrase_timeout = 3

[uart]
; how many times to attempt to read model output when current work string is too short
max_retry = 3
; how long to wait between retries (in seconds, as float)
retry_time = 0.25
use_picp = false
; frame_size is used only if PICP is not used
frame_size = 4

[log]
level = TRACE
dump  = true
log_path = ./.logs/